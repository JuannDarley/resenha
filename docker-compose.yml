services:
  postgres:
    image: postgres:17
    container_name: postgres-resenha
    environment:
      POSTGRES_DB: resenha
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: redis-resenha
    ports:
      - "6379:6379"

volumes:
  postgres_data: